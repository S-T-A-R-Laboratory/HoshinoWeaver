name: Tests

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

jobs:
  test-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Build C++ custom ops
        run: python csrc/build_ops.py --compiler gcc

      - name: Run tests (compiled backend)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tests/ -v --tb=short --cov=hoshicore --cov-report=term-missing -x

      - name: Run tests (numpy fallback)
        env:
          PYTHONPATH: ${{ github.workspace }}
          HNW_CUSTOM_OPS_FALLBACK: numpy
        run: pytest tests/ -v --tb=short -x

  test-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build C++ custom ops
        run: python csrc/build_ops.py --compiler msvc

      - name: Run tests (compiled backend)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tests/ -v --tb=short -x

      - name: Run tests (numpy fallback)
        env:
          PYTHONPATH: ${{ github.workspace }}
          HNW_CUSTOM_OPS_FALLBACK: numpy
        run: pytest tests/ -v --tb=short -x
