description: "星轨叠加（fifo 最大值 / mix 噪声均衡入口）"
version: "1"

# ── 全局输入 ──
inputs:
  fnames: { type: sequence, required: true }

# ── 路由定义 ──
routes:
  mode:
    options:
      fifo: TrailStackerOp
      mix:  mix_core.yaml
      #tmax: threshold_max_startrail.yaml
    default: fifo

# ── 全局配置 ──
configs:
  fin:              { type: float, default: 0 }
  fout:             { type: float, default: 0 }
  enable_star_shrink:     { type: bool, default: false }
  enable_satellite_clean: { type: bool, default: false }
  sat_window_size:        { type: int,  default: 3 }
  mask: { type: str, required: false, default: null }
  int_weight:       { type: bool,  default: true }
  enable_exif:      { type: bool,  default: true }
  exif_reduce_type: { type: str,   default: "sum" }
  loader_type:      { type: str,   default: "img_file_list" }
  loader_configs:   { type: dict,  default: {} }
  output_filename:  { type: str,   required: true }
  output_dtype:     { type: str,   default: "uint16" }
  jpg_quality:      { type: int,   default: 85 }
  png_compressing:  { type: int,   default: 7 }

# ── 路由专属配置 ──
route_configs:
  mode:
    mix:
      rej_high:    { type: float, default: 3.0 }
      rej_low:     { type: float, default: 3.0 }
      max_iter:    { type: int,   default: 5 }
      buffer_mode: { type: str,   default: "disk", global: true }
      mask:        { type: str,   default: null }
      minus_only:  { type: bool,  default: true }
    tmax:
      rej_high:    { type: float, default: 3.0 }
      rej_low:     { type: float, default: 3.0 }
      max_iter:    { type: int,   default: 5 }
      buffer_mode: { type: str,   default: "disk", global: true }
      mask:        { type: str,   default: null }
      n_sigma:     { type: float, default: -1 }

# ── 节点 ──
#
#  inputs.fnames ──┬──► data_loader ──────────────────► core_algo ──► image_saver
#                  ├──► weight_generator ──────────────►
#                  └──► exif_loader ──► exif_reducer ──►

nodes:
  data_loader:
    op: ImgDataLoaderOp
    inputs:
      src: inputs.fnames
    configs:
      loader_type: configs.loader_type
      configs: configs.loader_configs
    outputs:
      result: { type: sequence }

  satellite_clean:
    op: satellite_clean.yaml
    enable: configs.enable_satellite_clean
    bypass: data
    inputs:
      data: data_loader.result
    configs:
      window_size: configs.sat_window_size
      mask: configs.mask
    outputs:
      result: { type: sequence }
  
  star_shrink:
    op: StarShrinkOp
    enable: configs.enable_star_shrink
    bypass: data
    inputs:
      data: satellite_clean.result
    outputs:
      result: { type: sequence }

  weight_generator:
    op: WeightGeneratorOp
    inputs:
      sequence: inputs.fnames
    configs:
      fin: configs.fin
      fout: configs.fout
    outputs:
      result: { type: sequence }

  core_algo:
    route_key: mode
    label: "星轨叠加"
    inputs:
      data: star_shrink.result
      weight: weight_generator.result
    route_inputs:
      mix: {fnames: inputs.fnames}
      tmax: {fnames: inputs.fnames}
    route_configs:
      fifo:
        int_weight: configs.int_weight
      mix:
        int_weight: configs.int_weight
        # rej_high, rej_low, max_iter, buffer_mode, mask, minus_only — auto-wired
      tmax:
        int_weight: configs.int_weight
        # rej_high, rej_low, max_iter, buffer_mode, mask, n_sigma — auto-wired
    outputs:
      result: { type: image }

  exif_loader:
    op: ExifReadOp
    enable: configs.enable_exif
    inputs:
      fnames: inputs.fnames
    outputs:
      result: { type: sequence }

  exif_reducer:
    op: ExifReduceOp
    inputs:
      exifs: exif_loader.result
    configs:
      merge_method: configs.exif_reduce_type
    outputs:
      result: { type: object }

  image_saver:
    op: ImageSaveOp
    configs:
      image: core_algo.result
      exif: exif_reducer.result
      output_dtype: configs.output_dtype
      output_filename: configs.output_filename
      jpg_quality: configs.jpg_quality
      png_compressing: configs.png_compressing
    outputs:
      return_code: { type: int }

# ── 全局输出 ──
outputs:
  result: image_saver.return_code
