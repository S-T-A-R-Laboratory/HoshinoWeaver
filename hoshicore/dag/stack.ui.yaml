inputs:
  fnames:
    label: "图像文件"
    widget: file_picker
    accept: ".tif,.tiff,.fits,.png,.jpg,.cr2,.nef,.arw"

routes:
  stacker:
    label: "叠加算法"
    widget: tabs
    options:
      mean:
        label: "均值"
        description: "高信噪比平均叠加"
      sigma_clip:
        label: "Sigma 裁剪"
        description: "迭代剔除异常像素后求均值"
      median:
        label: "中位数"
        description: "逐像素取中位数，天然抗异常值"
      huber_mean:
        label: "Huber 均值"
        description: "基于 Huber 损失的稳健均值估计"

configs:
  int_weight:
    label: "整数权重"
    description: "启用使用整数累加，改善精度，速度更快"
    widget: switch
  output_dtype:
    hidden: true
  output_filename:
    hidden: true
  exif_reduce_type:
    hidden: true
  loader_type:
    hidden: true
  loader_configs:
    hidden: true

route_configs:
  sigma_clip:
    rej_low:
      label: "排异 σ 范围"
      description: "低于/高于均值多少个标准差视为异常值"
      widget: range_slider
      bind: rej_high
      min: -5.0
      max: 5.0
      step: 0.1
      transform: {left: abs}
    rej_high:
      hidden: true
    max_iter:
      label: "最大迭代次数"
      widget: slider
      min: 1
      max: 20
      step: 1
  median:
    chunk_rows:
      label: "分块行数"
      description: "逐行分块处理，越大越快但内存占用越高"
      widget: slider
      min: 8
      max: 128
      step: 8
  huber_mean:
    huber_c:
      label: "Huber 常数 c"
      description: "越小越稳健（更多像素被降权），越大越接近普通均值"
      widget: slider
      min: 0.1
      max: 5.0
      step: 0.05

layout:
  groups:
    - name: "基础设置"
      keys: [int_weight]
  order: [stacker, int_weight]

outputs:
  - filename_key: output_filename
    label: "输出图像"
    type: image
    dtype_key: output_dtype
    formats: ["JPG", "PNG", "TIFF"]
    dtype_options: ["uint8", "uint16"]
    format_params:
      jpg_quality: jpg_quality
      png_compressing: png_compressing
