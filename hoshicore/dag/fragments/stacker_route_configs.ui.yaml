sigma_clip:
  rej_low:
    label: "低亮度排异 σ 阈值"
    description: "低于均值多少个标准差视为异常值"
    widget: slider
    min: 0
    max: 5.0
    step: 0.1
  rej_high:
    label: "高亮度排异 σ 阈值"
    description: "高于均值多少个标准差视为异常值"
    widget: slider
    min: 0
    max: 5.0
    step: 0.1
  max_iter:
    label: "最大迭代次数"
    widget: slider
    min: 1
    max: 10
    step: 1
  early_converge_ratio:
    label: "早停比例"
    description: "连续两轮保留像素比例超过此值时提前终止"
    widget: slider
    min: 0.9
    max: 1.0
    step: 0.01
huber_mean:
  huber_c:
    label: "Huber 常数 c"
    description: "越小越稳健（更多像素被降权），越大越接近普通均值"
    widget: slider
    min: 0.1
    max: 5.0
    step: 0.05
