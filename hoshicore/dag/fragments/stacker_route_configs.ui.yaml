sigma_clip:
  rej_low:
    label: "排异阈值下界"
    description: "低于均值多少个标准差σ视为异常值"
    widget: slider
    min: 0
    max: 5.0
    step: 0.1
  rej_high:
    label: "排异阈值上界"
    description: "高于均值多少个标准差σ视为异常值"
    widget: slider
    min: 0
    max: 5.0
    step: 0.1
  max_iter:
    label: "最大迭代次数"
    widget: slider
    min: 1
    max: 10
    step: 1
  temp_path:
    hidden: true
huber_mean:
  huber_c:
    label: "Huber 常数 c"
    description: "越小越稳健（更多像素被降权），越大越接近普通均值"
    widget: slider
    min: 0.1
    max: 5.0
    step: 0.05
max_mix:
  rej_low:
    label: "排异阈值下界"
    description: "低于均值多少个标准差σ视为异常值"
    widget: slider
    min: 0
    max: 5.0
    step: 0.1
  rej_high:
    label: "排异阈值上界"
    description: "高于均值多少个标准差σ视为异常值"
    widget: slider
    min: 0
    max: 5.0
    step: 0.1
  max_iter:
    label: "最大迭代次数"
    widget: slider
    min: 1
    max: 10
    step: 1
  temp_path:
    hidden: true
  minus_only:
      label: "平衡亮度"
      description: "仅平衡最大值结果亮度，不额外执行最大值叠加的统计学还原"
      widget: switch