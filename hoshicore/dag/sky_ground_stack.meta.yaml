description: "天地分离对齐叠加（天空/地面算法独立可选）"
version: "2"

# ── 全局输入 ──
inputs:
  fnames: { type: sequence, required: true }

# ── 路由定义 ──
# 天空和地面使用独立路由，允许选择不同的叠加算法
routes:
  sky_stacker:
    options:
      mean: null # fixed-op，op 由节点 op 字段决定
      sigma_clip: null
      huber_mean: null
      median: null
      max_mix: null
      max: null
    default: sigma_clip
  ground_stacker:
    options:
      mean: null
      sigma_clip: null
      huber_mean: null
      median: null
      max_mix: null
      max: null
    default: mean

# ── 全局配置 ──
configs:
  int_weight: { type: bool, default: true }
  enable_exif: { type: bool, default: true }
  exif_reduce_type: { type: str, default: "sum" }
  output_dtype: { type: str, default: "uint16" }
  jpg_quality: { type: int, default: 85 }
  png_compressing: { type: int, default: 7 }
  loader_type: { type: str, default: "img_file_list" }
  loader_configs: { type: dict, default: {} }
  align_method: { type: str, default: "homography" }
  align_base: {type: str, default: null}
  same_camera: { type: bool, default: true }
  distortion: { type: list, default: null }
  output_filename:  { type: str,   required: true }
  mask: { type: str, required: false, default: null }
  enable_ground: { type: bool, default: true }

# ── 路由专属配置 ──
route_configs:
  sky_stacker:
    sigma_clip:
      rej_high: { type: float, default: 3.0 }
      rej_low: { type: float, default: 3.0 }
      max_iter: { type: int, default: 5 }
      temp_path: { type: str, default: null }
    huber_mean:
      huber_c: { type: float, default: 1.345 }
      temp_path: { type: str, default: null }
    max_mix:
      rej_high: { type: float, default: 3.0 }
      rej_low: { type: float, default: 3.0 }
      max_iter: { type: int, default: 5 }
      temp_path: { type: str, default: null }
      minus_only: { type: bool, default: true }
  ground_stacker:
    sigma_clip:
      rej_high: { type: float, default: 3.0 }
      rej_low: { type: float, default: 3.0 }
      max_iter: { type: int, default: 5 }
      temp_path: { type: str, default: null }
    huber_mean:
      huber_c: { type: float, default: 1.345 }
      temp_path: { type: str, default: null }
    max_mix:
      rej_high: { type: float, default: 3.0 }
      rej_low: { type: float, default: 3.0 }
      max_iter: { type: int, default: 5 }
      temp_path: { type: str, default: null }
      minus_only: { type: bool, default: true }

# ── 节点 ──
#
#  inputs.fnames ──┬──► data_loader ──┬──► star_aligner ──► sky_stacker ────┐
#                  │                  │                                      │
#                  │                  └──► ground_stacker ───────────────────┼──► image_add ──► image_saver
#                  │                                                         │
#                  ├──► exif_loader ──► star_aligner ──► exif_reducer ───────┘
#                  │
#                  └──► load_mask ──┬──► sky_stacker
#                                   └──► mask_invert ──► ground_stacker

nodes:
  data_loader:
    op: ImgDataLoaderOp
    inputs:
      src: inputs.fnames
    configs:
      loader_type: configs.loader_type
      configs: configs.loader_configs
    outputs:
      result: { type: sequence }

  exif_loader:
    op: ExifReadOp
    enable: configs.enable_exif
    inputs:
      fnames: inputs.fnames
    outputs:
      result: { type: sequence }

  load_mask:
    op: LoadMaskImageOp
    configs:
      path: configs.mask
    outputs:
      result: { type: image }

  mask_invert:
    op: MaskInvertOp
    configs:
      mask: load_mask.result
    outputs:
      result: { type: image }

  apply_sky_mask:
    op: ApplyMaskOp
    inputs:
      image: data_loader.result
    configs:
      mask: load_mask.result
    outputs:
      result: { type: sequence }

  apply_ground_mask:
    op: ApplyMaskOp
    inputs:
      image: data_loader.result
    configs:
      mask: mask_invert.result
    outputs:
      result: { type: sequence }

  load_align_base:
    op: LoadSingleImageOp
    configs:
      path: configs.align_base
    outputs:
      result: {type: image}

  star_aligner:
    op: StarAlignmentOp
    inputs:
      data: apply_sky_mask.result
      exifs: exif_loader.result
    configs:
      reference: load_align_base.result
      method: configs.align_method
      same_camera: configs.same_camera
      distortion: configs.distortion
    outputs:
      result: { type: sequence }
      aligned_exifs: { type: sequence }

  sky_stacker:
    op: stacker.meta.yaml # fixed-op；route_key 选择 route_configs 分支
    route_key: sky_stacker
    routes:
      stacker: routes.sky_stacker # 透传父图选择到子图 stacker route
    inputs:
      data: star_aligner.result
    route_configs:
      mean:
        int_weight: configs.int_weight
        mask: load_mask.result
      sigma_clip:
        int_weight: configs.int_weight
        mask: load_mask.result
        # rej_high, rej_low, max_iter — auto-wired
      huber_mean:
        int_weight: configs.int_weight
        mask: load_mask.result
        # huber_c — auto-wired
      median:
        mask: load_mask.result
      max_mix:
        int_weight: configs.int_weight
      max:
        int_weight: configs.int_weight
    outputs:
      result: { type: image }

  ground_stacker:
    op: stacker.meta.yaml # fixed-op；route_key 选择 route_configs 分支
    enable: configs.enable_ground
    route_key: ground_stacker
    routes:
      stacker: routes.ground_stacker # 透传父图选择到子图 stacker route
    inputs:
      data: apply_ground_mask.result
    route_configs:
      mean:
        int_weight: configs.int_weight
        mask: mask_invert.result
      sigma_clip:
        int_weight: configs.int_weight
        mask: mask_invert.result
        # rej_high, rej_low, max_iter — auto-wired
      huber_mean:
        int_weight: configs.int_weight
        mask: mask_invert.result
        # huber_c — auto-wired
      median:
        mask: mask_invert.result
      max_mix:
        int_weight: configs.int_weight
      max:
        int_weight: configs.int_weight
    outputs:
      result: { type: image }

  result_apply_mask:
    op: ApplyMaskOp
    inputs:
      image: sky_stacker.result
    configs:
      mask: load_mask.result
    outputs:
      result: { type: sequence }    

  image_add:
    op: ImageAddOp
    configs:
      image_a: result_apply_mask.result
      image_b: ground_stacker.result
    outputs:
      result: { type: image }

  exif_reducer:
    op: ExifReduceOp
    inputs:
      exifs: star_aligner.aligned_exifs
    configs:
      merge_method: configs.exif_reduce_type
    outputs:
      result: { type: object }

  image_saver:
    op: ImageSaveOp
    configs:
      image: image_add.result
      exif: exif_reducer.result
      output_filename: configs.output_filename
      output_dtype: configs.output_dtype
      jpg_quality: configs.jpg_quality
      png_compressing: configs.png_compressing
    outputs:
      return_code: { type: int }

# ── 全局输出 ──
outputs:
  result: image_saver.return_code
