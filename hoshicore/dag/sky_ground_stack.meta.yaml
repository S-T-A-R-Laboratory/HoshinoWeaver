description: "天地分离对齐叠加（天空/地面算法独立可选）"
version: "2"

# ── 全局输入 ──
inputs:
  fnames: { type: sequence, required: true }

# ── 路由定义 ──
# 天空和地面使用独立路由，允许选择不同的叠加算法
routes:
  sky_stacker:
    options:
      mean:       null   # fixed-op，op 由节点 op 字段决定
      sigma_clip: null
      huber_mean: null
    default: sigma_clip
  ground_stacker:
    options:
      mean:       null
      huber_mean: null
    default: mean

# ── 全局配置 ──
configs:
  int_weight:       { type: bool,  default: true }
  exif_reduce_type: { type: str,   default: "sum" }
  output_filename:  { type: str,   default: "result.tif" }
  output_dtype:     { type: str,   default: "uint16" }
  loader_type:      { type: str,   default: "img_file_list" }
  loader_configs:   { type: dict,  default: {} }
  align_method:     { type: str,   default: "auto" }
  same_camera:      { type: bool,  default: true }
  distortion:       { type: list,  default: null }
  mask:             { type: str,   required: false, default: null }

# ── 路由专属配置 ──
route_configs:
  sky_stacker:
    sigma_clip:
      rej_high:             { type: float, default: 3.0 }
      rej_low:              { type: float, default: 3.0 }
      max_iter:             { type: int,   default: 5 }
      early_converge_ratio: { type: float, default: 0.99 }
    huber_mean:
      huber_c: { type: float, default: 1.345 }
  ground_stacker:
    huber_mean:
      huber_c: { type: float, default: 1.345 }

# ── 节点 ──
#
#  inputs.fnames ──┬──► data_loader ──┬──► star_aligner ──► sky_stacker ────┐
#                  │                  │                                      │
#                  │                  └──► ground_stacker ───────────────────┼──► image_add ──► image_saver
#                  │                                                         │
#                  ├──► exif_loader ──► star_aligner ──► exif_reducer ───────┘
#                  │
#                  └──► load_mask ──┬──► sky_stacker
#                                   └──► mask_invert ──► ground_stacker

nodes:
  data_loader:
    op: ImgDataLoaderOp
    inputs:
      src: inputs.fnames
    configs:
      loader_type: configs.loader_type
      configs: configs.loader_configs
    outputs:
      result: { type: sequence }

  exif_loader:
    op: ExifReadOp
    inputs:
      fnames: inputs.fnames
    outputs:
      result: { type: sequence }

  load_mask:
    op: LoadMaskImageOp
    configs:
      path: configs.mask
    outputs:
      result: { type: image }

  mask_invert:
    op: MaskInvertOp
    configs:
      mask: load_mask.result
    outputs:
      result: { type: image }

  star_aligner:
    op: StarAlignmentOp
    inputs:
      data: data_loader.result
      exifs: exif_loader.result
    configs:
      method: configs.align_method
      same_camera: configs.same_camera
      distortion: configs.distortion
    outputs:
      result: { type: sequence }
      aligned_exifs: { type: sequence }

  sky_stacker:
    op: stacker.meta.yaml      # fixed-op；route_key 选择 route_configs 分支
    route_key: sky_stacker
    routes:
      stacker: routes.sky_stacker   # 透传父图选择到子图 stacker route
    inputs:
      data: star_aligner.result
    route_configs:
      mean:
        int_weight: configs.int_weight
        mask: load_mask.result
      sigma_clip:
        int_weight: configs.int_weight
        mask: load_mask.result
        # rej_high, rej_low, max_iter, early_converge_ratio — auto-wired
      huber_mean:
        int_weight: configs.int_weight
        mask: load_mask.result
        # huber_c — auto-wired
    outputs:
      result: { type: image }

  ground_stacker:
    op: stacker.meta.yaml      # fixed-op；route_key 选择 route_configs 分支
    route_key: ground_stacker
    routes:
      stacker: routes.ground_stacker   # 透传父图选择到子图 stacker route
    inputs:
      data: data_loader.result
    route_configs:
      mean:
        int_weight: configs.int_weight
        mask: mask_invert.result
      huber_mean:
        int_weight: configs.int_weight
        mask: mask_invert.result
        # huber_c — auto-wired
    outputs:
      result: { type: image }

  image_add:
    op: ImageAddOp
    configs:
      image_a: sky_stacker.result
      image_b: ground_stacker.result
    outputs:
      result: { type: image }

  exif_reducer:
    op: ExifReduceOp
    inputs:
      exifs: star_aligner.aligned_exifs
    configs:
      merge_method: configs.exif_reduce_type
    outputs:
      result: { type: object }

  image_saver:
    op: ImageSaveOp
    configs:
      image: image_add.result
      exif: exif_reducer.result
      output_filename: configs.output_filename
      output_dtype: configs.output_dtype
    outputs:
      return_code: { type: int }

# ── 全局输出 ──
outputs:
  result: image_saver.return_code
