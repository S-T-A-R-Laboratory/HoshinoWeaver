description: "卫星线去除（滑动窗口对齐中位数法）"
version: "1"

inputs:
  data: { type: sequence, required: true }

configs:
  window_size: { type: int, default: 3 }
  mask: { type: str, required: false, default: null }

nodes:
  load_mask:
    op: LoadMaskImageOp
    configs:
      path: configs.mask
    outputs:
      result: { type: image }

  sat_clean:
    op: SatelliteCleanOp
    inputs:
      data: inputs.data
    configs:
      window_size: configs.window_size
      mask: load_mask.result
    outputs:
      result: { type: sequence }

outputs:
  result: sat_clean.result
