description: "通用校准 + 堆栈流水线（Meta YAML）"
version: "1"

# ── 全局输入 ──
inputs:
  light_fnames: { type: sequence, required: true }
  bias_fnames:  { type: sequence, required: false }
  dark_fnames:  { type: sequence, required: false }
  flat_fnames:  { type: sequence, required: false }

# ── 全局配置 ──
configs:
  loader_type: { type: str, default: "img_file_list" }
  loader_configs: { type: dict, default: {} }
  int_weight: { type: bool, default: true }
  rej_high: { type: float, default: 3.0 }
  rej_low: { type: float, default: 3.0 }
  max_iter: { type: int, default: 5 }
  exif_reduce_type: { type: str, default: "sum" }
  output_filename: { type: str, default: "result.tif" }
  output_dtype: { type: str, default: "uint8" }
  bias_master_path: { type: str, default: null }
  dark_master_path: { type: str, default: null }
  flat_master_path: { type: str, default: null }

# ── 节点 ──
#
# 拓扑概览（所有可选路径展开）：
#
#   bias_fnames ──► bias_stacker ──────────────────────┬──► bias_subtract ──┐
#   dark_fnames ──► dark_stacker ──────────────────────┼──► dark_subtract ──┤
#   flat_fnames ──► flat_stacker ──► flat_bias_sub ────┼──► flat_divide ────┤
#                                                      │                    │
#   light_fnames ──► light_loader ─────────────────────┘                    │
#                                                                           ▼
#                                                    main_stacker ──► image_saver
#
#   bias/dark/flat_stacker 是路由节点（route），可选：
#     none   → NoneOutputOp（下游 passthrough）
#     master → LoadSingleImageOp（从文件加载）
#     mean   → MeanStackerOp（从序列求平均）
#     median → median_stack_core.yaml（从序列求中位数）
#
#   main_stacker 也是路由节点，可选：
#     mean       → MeanStackerOp
#     median     → median_stack_core.yaml
#     sigma_clip → sigma_clip.yaml

nodes:
  # ── Light 加载 ──
  light_loader:
    op: ImgDataLoaderOp
    inputs:
      src: inputs.light_fnames
    configs:
      loader_type: configs.loader_type
      configs: configs.loader_configs
    outputs:
      result: { type: sequence }

  # ── Bias master ──
  bias_stacker:
    route:
      none: NoneOutputOp
      master: LoadSingleImageOp
      mean: MeanStackerOp
      median: median_stack_core.yaml
    route_inputs:
      mean:   { data: inputs.bias_fnames }
      median: { data: inputs.bias_fnames }
    route_configs:
      master: { path: configs.bias_master_path }
      mean:   { int_weight: configs.int_weight }
    outputs:
      result: { type: image }

  # ── Bias 减法（reference=None 时 passthrough）──
  bias_subtract:
    op: CalibrationSubtractOp
    inputs:
      data: light_loader.result
    configs:
      reference: bias_stacker.result
    outputs:
      result: { type: sequence }

  # ── Dark master ──
  dark_stacker:
    route:
      none: NoneOutputOp
      master: LoadSingleImageOp
      mean: MeanStackerOp
      median: median_stack_core.yaml
    route_inputs:
      mean:   { data: inputs.dark_fnames }
      median: { data: inputs.dark_fnames }
    route_configs:
      master: { path: configs.dark_master_path }
      mean:   { int_weight: configs.int_weight }
    outputs:
      result: { type: image }

  # ── Dark 减法 ──
  dark_subtract:
    op: CalibrationSubtractOp
    inputs:
      data: bias_subtract.result
    configs:
      reference: dark_stacker.result
    outputs:
      result: { type: sequence }

  # ── Flat master ──
  flat_stacker:
    route:
      none: NoneOutputOp
      master: LoadSingleImageOp
      mean: MeanStackerOp
      median: median_stack_core.yaml
    route_inputs:
      mean:   { data: inputs.flat_fnames }
      median: { data: inputs.flat_fnames }
    route_configs:
      master: { path: configs.flat_master_path }
      mean:   { int_weight: configs.int_weight }
    outputs:
      result: { type: image }

  # ── Flat 的 Bias 减法（Flat 自身也需要去 Bias）──
  flat_bias_subtract:
    op: CalibrationSubtractOp
    configs:
      data: flat_stacker.result
      reference: bias_stacker.result
    outputs:
      result: { type: image }

  # ── Flat 除法 ──
  flat_divide:
    op: CalibrationDivideOp
    inputs:
      data: dark_subtract.result
    configs:
      reference: flat_bias_subtract.result
    outputs:
      result: { type: sequence }

  # ── 主堆栈 ──
  main_stacker:
    route:
      mean: MeanStackerOp
      median: median_stack_core.yaml
      sigma_clip: sigma_clip.yaml
    inputs:
      data: flat_divide.result
    route_configs:
      mean:
        int_weight: configs.int_weight
      sigma_clip:
        int_weight: configs.int_weight
        rej_high: configs.rej_high
        rej_low: configs.rej_low
        max_iter: configs.max_iter
    outputs:
      result: { type: image }

  # ── EXIF ──
  exif_loader:
    op: ExifReadOp
    inputs:
      fnames: inputs.light_fnames
    outputs:
      result: { type: sequence }

  exif_reducer:
    op: ExifReduceOp
    inputs:
      exifs: exif_loader.result
    configs:
      merge_method: configs.exif_reduce_type
    outputs:
      result: { type: object }

  # ── 保存 ──
  image_saver:
    op: ImageSaveOp
    configs:
      image: main_stacker.result
      exif: exif_reducer.result
      output_filename: configs.output_filename
      output_dtype: configs.output_dtype
    outputs:
      return_code: { type: int }

# ── 全局输出 ──
outputs:
  result: image_saver.return_code
