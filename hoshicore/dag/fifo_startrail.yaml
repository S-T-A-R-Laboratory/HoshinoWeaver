description: "带有渐入渐出的最大值叠加，适用于直接生成渐入渐出星轨"
version: "1"

# ── 节点 ──
#
#  inputs.fnames ──┬──► data_loader ──────────┐
#                  │                          ├──► trailstacker ───┐
#                  │                          │                    │
#                  │                          │                    ├─► image_saver
#                  ├──► weight_generator ─────┘                    │
#                  │                                               │
#                  └──► exif_loader ─────────────► ─exif_reducer ──┘


inputs:
  fnames: { type: sequence, required: true }
configs:
  fin: { type: float, default: 0 }
  fout: { type: float, default: 0 }
  int_weight: { type: bool, default: true }
  input_dtype: { type: dtype, default: uint8 }
  output_filename: { type: str, default: "result.jpg" }
  loader_type: { type: str, default: "img_file_list" }
  exif_reduce_type: { type: str, default: "sum" }
nodes:
  exif_loader:
    op: ExifReadOp
    inputs:
      fnames: inputs.fnames
    outputs:
      result: { type: sequence }
  weight_generator:
    op: generate_weight
    inputs:
      sequence: inputs.fnames
    configs:
      fin: configs.fin
      fout: configs.fout
      int_weight: configs.int_weight
      input_dtype: configs.input_dtype
    outputs:
      result: { type: sequence }
  data_loader:
    op: DataLoaderOp
    inputs:
      src: inputs.fnames
    configs:
      loader_type: configs.loader_type
    outputs:
      result: { type: sequence }
  trailstacker:
    op: TrailStackerOp
    inputs:
      data: data_loader.result
      weight: weight_generator.result
    configs:
      int_weight: configs.int_weight
    outputs:
      result: { type: image }
  exif_reducer:
    op: ExifReduceOp
    inputs:
      exifs: exif_loader.result
    configs:
      merge_method: configs.exif_reduce_type
    outputs:
      result: { type: object }
  image_saver:
    op: ImageSaveOp
    configs:
      image: trailstacker.result
      exif: exif_reducer.result
      output_filename: configs.output_filename
    outputs:
      return_code: { type: int }
outputs:
  result: image_saver.return_code
