inputs:
  fnames:
    label: "图像文件"
    widget: file_picker
    accept: ".tif,.tiff,.fits,.png,.jpg,.cr2,.nef,.arw"

routes:
  sky_stacker:
    label: "天空叠加算法"
    widget: tabs
    options:
      mean:
        label: "均值"
        description: "高信噪比平均叠加"
      sigma_clip:
        label: "Sigma 裁剪"
        description: "迭代剔除异常像素后求均值"
      huber_mean:
        label: "Huber 均值"
        description: "基于 Huber 损失的稳健均值估计"
      median:
        label: "中位数"
        description: "逐像素取中位数，天然抗异常值"
  ground_stacker:
    label: "地面叠加算法"
    widget: tabs
    options:
      mean:
        label: "均值"
        description: "高信噪比平均叠加"
      sigma_clip:
        label: "Sigma 裁剪"
        description: "迭代剔除异常像素后求均值"
      huber_mean:
        label: "Huber 均值"
        description: "基于 Huber 损失的稳健均值估计"
      median:
        label: "中位数"
        description: "逐像素取中位数，天然抗异常值"

configs:
  int_weight:
    label: "整数权重"
    description: "启用使用整数累加，改善精度，速度更快"
    widget: switch
  output_dtype:
    label: "输出位深"
    widget: select
    options: ["uint8", "uint16"]
  output_filename:
    label: "输出文件名"
    widget: input
  align_method:
    label: "对齐方式"
    description: "星点对齐算法（auto = 自动选择）"
    widget: select
    options: ["auto", "homography", "affine"]
  same_camera:
    label: "同一相机"
    description: "所有帧来自同一相机（优化对齐速度）"
    widget: switch
  mask:
    label: "天空区域掩模"
    description: "白色区域为天空，黑色区域为地面"
    widget: file_picker
    accept: ".tif,.tiff,.png"
  distortion:
    hidden: true
  exif_reduce_type:
    hidden: true
  loader_type:
    hidden: true
  loader_configs:
    hidden: true

route_configs:
  sigma_clip:
    rej_low:
      label: "排异 σ 范围"
      description: "低于/高于均值多少个标准差视为异常值"
      widget: range_slider
      bind: rej_high
      min: -5.0
      max: 5.0
      step: 0.1
      transform: {left: abs}
    rej_high:
      hidden: true
    max_iter:
      label: "最大迭代次数"
      widget: slider
      min: 1
      max: 10
      step: 1
    early_converge_ratio:
      label: "早停比例"
      description: "连续两轮保留像素比例超过此值时提前终止"
      widget: slider
      min: 0.9
      max: 1.0
      step: 0.01
  huber_mean:
    huber_c:
      label: "Huber 常数 c"
      description: "越小越稳健（更多像素被降权），越大越接近普通均值"
      widget: slider
      min: 0.1
      max: 5.0
      step: 0.05

layout:
  groups:
    - name: "对齐设置"
      keys: [align_method, same_camera, mask]
    - name: "输出设置"
      keys: [int_weight, output_dtype, output_filename]
  order: [sky_stacker, ground_stacker, align_method, same_camera, mask, int_weight, output_dtype, output_filename]
