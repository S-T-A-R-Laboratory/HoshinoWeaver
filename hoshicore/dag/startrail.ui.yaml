inputs:
  fnames:
    label: "图像文件"
    widget: file_picker
    accept: ".tif,.tiff,.fits,.png,.jpg,.cr2,.nef,.arw"

routes:
  mode:
    label: "星轨模式"
    widget: tabs
    options:
      fifo:
        label: "仅最大值"
        description: "仅计算最大值，经典星轨效果"
      mix:
        label: "噪声均衡"
        description: "Sigma 裁剪后求均值，抑制地面噪声同时保留星轨"
      #tmax:
      #  label: "阈值提取"
      #  description: "阈值裁剪后最大值，减少噪声贡献"

configs:
  fin:
      label: "渐入渐出比例"
      description: "渐入渐出帧数比例"
      widget: range_slider
      bind: fout
      min: 0
      max: 1.0
      step: 0.05
      transform: {right: complement}
  fout:
      hidden: true
  enable_star_shrink:
    label: "启用缩星"
    description: "叠加星轨时缩小星点，使星轨更细腻"
    widget: switch
  enable_satellite_clean:
    label: "卫星线去除"
    description: "启用滑动窗口中位数法去除卫星/飞机轨迹"
    widget: switch
  sat_window_size:
    label: "去卫星窗口"
    description: "滑动窗口半径（前后各取 N 帧）"
    widget: slider
    min: 1
    max: 5
    step: 1
  int_weight:
    label: "整数权重"
    description: "启用使用整数累加，改善精度，速度更快"
    widget: switch
  output_dtype:
    label: "输出位深"
    widget: select
    options: ["uint8", "uint16", "uint32"]
  output_filename:
    label: "输出文件名"
    widget: input
  exif_reduce_type:
    hidden: true
  loader_type:
    hidden: true
  loader_configs:
    hidden: true

route_configs:
  mix:
    rej_low:
      label: "排异 σ 范围"
      description: "低于/高于均值多少个标准差视为异常值"
      widget: range_slider
      bind: rej_high
      min: -5.0
      max: 5.0
      step: 0.1
      transform: {left: abs}
    rej_high:
      hidden: true
    max_iter:
      label: "最大迭代次数"
      widget: slider
      min: 1
      max: 20
      step: 1
    buffer_mode:
      hidden: true
    mask:
      label: "掩模文件"
      widget: file_picker
      accept: ".tif,.tiff,.png"
    minus_only:
      label: "平衡亮度"
      description: "仅平衡最大值结果亮度，不额外执行最大值叠加的统计学还原"
      widget: switch
  #tmax:
  #  rej_low:
  #    label: "排异 σ 范围"
  #    description: "低于/高于均值多少个标准差视为异常值"
  #    widget: range_slider
  #    bind: rej_high
  #    min: 0.5
  #    max: 6.0
  #    step: 0.1
  #  rej_high:
  #    hidden: true
  #  max_iter:
  #    label: "最大迭代次数"
  #    widget: slider
  #    min: 1
  #    max: 20
  #    step: 1
  #  buffer_mode:
  #    hidden: true
  #  mask:
  #    label: "掩膜文件"
  #    widget: file_picker
  #    accept: ".tif,.tiff,.png"
  #  n_sigma:
  #    label: "阈值 σ"
  #    description: "提取阈值（-1 = 自动计算）"
  #    widget: slider
  #    min: -1
  #    max: 10.0
  #    step: 0.5

layout:
  groups:
    - name: "星轨效果"
      keys: [fin, fout, enable_star_shrink]
    - name: "卫星线去除"
      keys: [enable_satellite_clean, sat_window_size]
    - name: "输出设置"
      keys: [int_weight, output_dtype, output_filename]
  order: [mode, fin, fout, enable_star_shrink, enable_satellite_clean, sat_window_size, int_weight, output_dtype, output_filename]
