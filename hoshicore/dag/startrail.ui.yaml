inputs:
  fnames:
    label: "图像文件"
    widget: file_picker
    accept: ".tif,.tiff,.fits,.png,.jpg,.cr2,.nef,.arw"

routes:
  mode:
    label: "星轨模式"
    widget: tabs
    options:
      fifo:
        label: "最大值"
        description: "逐像素取最大值，经典星轨拖尾效果"
      mix:
        label: "噪声均衡"
        description: "Sigma 裁剪后求均值，抑制地面噪声同时保留星轨"
      tmax:
        label: "阈值提取"
        description: "阈值裁剪后最大值，减少噪声贡献"

configs:
  fin:
    label: "渐入帧数"
    description: "起始渐入的帧数比例（0 = 不渐入）"
    widget: slider
    min: 0
    max: 1.0
    step: 0.05
  fout:
    label: "渐出帧数"
    description: "结尾渐出的帧数比例（0 = 不渐出）"
    widget: slider
    min: 0
    max: 1.0
    step: 0.05
  enable_star_shrink:
    label: "星点缩小"
    description: "启用后缩小星点使星轨更细腻"
    widget: switch
  enable_satellite_clean:
    label: "卫星线去除"
    description: "启用滑动窗口中位数法去除卫星/飞机轨迹"
    widget: switch
  sat_window_size:
    label: "去卫星窗口"
    description: "滑动窗口半径（前后各取 N 帧）"
    widget: slider
    min: 1
    max: 5
    step: 1
  int_weight:
    label: "整数权重"
    description: "启用使用整数累加，改善精度，速度更快"
    widget: switch
  output_dtype:
    label: "输出位深"
    widget: select
    options: ["uint8", "uint16"]
  output_filename:
    label: "输出文件名"
    widget: input
  exif_reduce_type:
    hidden: true
  loader_type:
    hidden: true
  loader_configs:
    hidden: true

route_configs:
  mix:
    rej_low:
      label: "排异 σ 范围"
      description: "低于/高于均值多少个标准差视为异常值"
      widget: range_slider
      bind: rej_high
      min: 0.5
      max: 6.0
      step: 0.1
    rej_high:
      hidden: true
    max_iter:
      label: "最大迭代次数"
      widget: slider
      min: 1
      max: 20
      step: 1
    buffer_mode:
      hidden: true
    mask:
      label: "掩膜文件"
      widget: file_picker
      accept: ".tif,.tiff,.png"
    minus_only:
      label: "仅减法"
      description: "仅对低于均值的像素执行裁剪"
      widget: switch
  tmax:
    rej_low:
      label: "排异 σ 范围"
      description: "低于/高于均值多少个标准差视为异常值"
      widget: range_slider
      bind: rej_high
      min: 0.5
      max: 6.0
      step: 0.1
    rej_high:
      hidden: true
    max_iter:
      label: "最大迭代次数"
      widget: slider
      min: 1
      max: 20
      step: 1
    buffer_mode:
      hidden: true
    mask:
      label: "掩膜文件"
      widget: file_picker
      accept: ".tif,.tiff,.png"
    n_sigma:
      label: "阈值 σ"
      description: "提取阈值（-1 = 自动计算）"
      widget: slider
      min: -1
      max: 10.0
      step: 0.5

layout:
  groups:
    - name: "星轨效果"
      keys: [fin, fout, enable_star_shrink]
    - name: "卫星线去除"
      keys: [enable_satellite_clean, sat_window_size]
    - name: "输出设置"
      keys: [int_weight, output_dtype, output_filename]
  order: [mode, fin, fout, enable_star_shrink, enable_satellite_clean, sat_window_size, int_weight, output_dtype, output_filename]
