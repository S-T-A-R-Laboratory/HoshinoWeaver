  #    description: "提取阈值（-1 = 自动计算）"
  #    widget: slider
  #    min: -1
  #    max: 10.0
  #    step: 0.5

layout:
  groups:
    - name: "星轨效果"
      keys: [fin, fout]
    - name: "预处理"
      keys:
        [
          int_weight,
          enable_star_shrink,
          enable_satellite_clean,
          sat_window_size,
          mask,
        ]
    - name: "输出设置"
  order:
    [
      mode,
      fin,
      fout,
      int_weight,
      enable_star_shrink,
      enable_satellite_clean,
      sat_window_size,
      mask,
    ]

outputs:
  - "!include": fragments/image_output.ui.yaml
