inputs:
  fnames:
    label: "图像文件"
    widget: file_picker
    accept: ".tif,.tiff,.fits,.png,.jpg,.cr2,.nef,.arw"

routes:
  mode:
    label: "星轨模式"
    widget: tabs
    options:
      fifo:
        label: "最大值叠加"
        description: "常规星轨算法，逐像素取最大值叠加。速度快，但对应用镜头校正的素材可能出现边角偏亮或环状纹理"
      mix:
        label: "噪声均匀化"
        description: "改进星轨算法，在最大值基础上校正因镜头校正引入的空间亮度不均和高频纹理"
      #tmax:
      #  label: "阈值提取"
      #  description: "阈值裁剪后最大值，减少噪声贡献"

configs:
  fin:
    label: "渐入/渐出"
    description: "左端=轨迹起始淡入比例，右端=轨迹末尾淡出比例。"
    widget: range_slider
    bind: fout
    min: 0
    max: 1.0
    step: 0.05
    transform: { right: complement }
  fout:
    hidden: true
  enable_star_shrink:
    label: "缩星"
    description: "缩小星点，使轨迹更稀疏。适用于星点密集的原始图像。"
    widget: switch
  enable_satellite_clean:
    label: "去卫星线"
    description: "去除卫星/飞机轨迹。"
    widget: switch
  sat_window_size:
    label: "去卫星窗口大小"
    description: "检测窗口帧数。越大去除越彻底，但可能会增大时间开销。推荐设置为 3。"
    widget: slider
    visible_when: { key: "enable_satellite_clean", eq: true }
    min: 3
    max: 9
    step: 2
  mask:
    label: "天空区域遮罩"
    description: "选择一张天空区域遮罩图像（白色=天空，黑色=地面）。该遮罩用于限定星点检测区域。"
    widget: file_picker
    accept: ".tif,.tiff,.png,.jpg"
    visible_when: { key: "enable_satellite_clean", eq: true }
  int_weight:
    hidden: true
  enable_exif:
    label: "写入 EXIF"
    description: "在输出文件中保留拍摄参数。关闭后输出不含 EXIF 信息"
    widget: switch
  output_dtype:
    hidden: true
  output_filename:
    hidden: true
  exif_reduce_type:
    hidden: true
  loader_type:
    hidden: true
  loader_configs:
    hidden: true
  jpg_quality:
    hidden: true
  png_compressing:
    hidden: true

route_configs:
  mix:
    rej_low:
      label: "暗像素排异阈值 (σ)"
      description: "估算背景时排除偏暗像素的激进程度。值越小排除越多。推荐 2.5–3.5"
      widget: slider
      min: 0
      max: 5.0
      step: 0.1
    rej_high:
      label: "亮像素排异阈值 (σ)"
      description: "估算背景时排除偏亮像素的激进程度。值越小排除越多。推荐 2.5–3.5"
      widget: slider
      min: 0
      max: 5.0
      step: 0.1
    max_iter:
      label: "最大迭代次数"
      description: "估算背景时迭代剔除的最大轮数。越多越精确但越慢，通常 3–5 次即可"
      widget: slider
      min: 1
      max: 20
      step: 1
    buffer_mode:
      hidden: true
    mask:
      label: "天空区域遮罩"
      description: "选择一张天空区域遮罩图像（白色=天空，黑色=地面）。启用该遮罩时，天空区域将使用星轨叠加结果，地面区域使用Sigma裁剪均值结果融合。"
      widget: file_picker
      accept: ".tif,.tiff,.png,.jpg"
    minus_only:
      label: "还原均值亮度"
      description: "开启后将背景降至均值水平，轨迹对比度更高，和平均值地景融合更好。关闭则仅消除不均匀"
      widget: switch
